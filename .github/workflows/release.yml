name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        run: npm run tauri build

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release-assets
          FOUND=0
          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            while IFS= read -r -d '' file; do
              FOUND=1
              base="$(basename "$file")"
              cp "$file" "release-assets/local-player-${VERSION}-${{ matrix.platform }}-${base}"
            done < <(find src-tauri/target/release/bundle -type f \( -name "*.dmg" -o -name "*.app.tar.gz" \) -print0)
          else
            while IFS= read -r -d '' file; do
              FOUND=1
              base="$(basename "$file")"
              cp "$file" "release-assets/local-player-${VERSION}-${{ matrix.platform }}-${base}"
            done < <(find src-tauri/target/release/bundle -type f \( -name "*.msi" -o -name "*.exe" \) -print0)
          fi

          if [[ "$FOUND" -eq 0 ]]; then
            echo "No bundle artifacts found for ${{ matrix.platform }}"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}
          path: release-assets/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums and manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          npm run release:manifest -- \
            --input release-assets \
            --output release-assets/release-manifest.json \
            --checksums release-assets/checksums.txt \
            --version "$VERSION" \
            --base-url "$BASE_URL"

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*
